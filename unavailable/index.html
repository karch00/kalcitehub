<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Unavailable</title>
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <meta name="description" content="Site unavailable" />
        <link rel="icon" href="../favicon.png" />
        <link
            rel="stylesheet"
            type="text/css"
            href="../styles/unavailable.css"
        />
    </head>
    <body>
        <main>
            <div class="section-header-row">
                <div class="section-header">
                    <span class="index">[ 00 ]</span>
                    <span class="label">ERROR</span>
                    <span class="line"></span>
                </div>
            </div>

            <div class="cards">
                <div class="card">
                    <div>
                        <span class="pill">[ Unavailable ]</span>
                    </div>
                    <div class="message-box">
                        <p>
                            Accessed content is currently unavailable.
                            <br />
                            Contact the administrator if this should not be the
                            case.
                        </p>
                    </div>
                </div>
            </div>

            <div class="ghost">
                <div class="bracket"></div>
            </div>
        </main>
    </body>
</html>
